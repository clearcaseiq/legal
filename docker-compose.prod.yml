services:
  db:
    image: pgvector/pgvector:pg16
    container_name: clearcaseiq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clearcaseiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-clearcaseiq}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/ml-service/sql/init_pgvector.sql:/docker-entrypoint-initdb.d/010-init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clearcaseiq} -d ${POSTGRES_DB:-clearcaseiq}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - clearcaseiq

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: clearcaseiq-api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-clearcaseiq}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-clearcaseiq}?schema=public
      API_URL: https://api.clearcaseiq.com
      WEB_URL: https://www.clearcaseiq.com
      CORS_ORIGINS: https://www.clearcaseiq.com,https://clearcaseiq.com
      TRUST_PROXY: "1"
      FILE_BUCKET: ${FILE_BUCKET:-s3}
      OCR_PROVIDER: aws_textract
      ENABLE_OCR: "true"
      PDF_TEXTRACT_FALLBACK: "true"
      AWS_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
    expose:
      - "4000"
    networks:
      - clearcaseiq

  web:
    build:
      context: .
      dockerfile: app/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.clearcaseiq.com
    container_name: clearcaseiq-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: https://api.clearcaseiq.com
    depends_on:
      - api
    expose:
      - "3000"
    networks:
      - clearcaseiq

  nginx:
    image: nginx:1.27-alpine
    container_name: clearcaseiq-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/clearcaseiq.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - clearcaseiq

volumes:
  postgres_data:
  api_uploads:

networks:
  clearcaseiq:
    driver: bridge
