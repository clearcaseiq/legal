<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClearCaseIQ → CMS</title>
    <style>
      :root { color-scheme: light; }
      body { width: 340px; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #111827; }
      header { display: flex; align-items: center; gap: 8px; padding: 12px 14px; background: #4f46e5; color: #fff; }
      header h1 { font-size: 14px; margin: 0; font-weight: 600; }
      main { padding: 12px 14px; }
      label { display: block; font-size: 12px; font-weight: 600; margin: 10px 0 4px; color: #374151; }
      input, select { width: 100%; box-sizing: border-box; padding: 7px 9px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; }
      button { margin-top: 12px; width: 100%; padding: 9px; border: 0; border-radius: 8px; background: #4f46e5; color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
      button.secondary { background: #f3f4f6; color: #374151; }
      button:disabled { opacity: .5; cursor: default; }
      .row { display: flex; gap: 8px; }
      .row > * { flex: 1; }
      .muted { font-size: 11px; color: #6b7280; margin: 6px 0 0; }
      .status { margin-top: 10px; padding: 8px 10px; border-radius: 8px; font-size: 12px; display: none; }
      .status.ok { display: block; background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
      .status.err { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
      details { margin-top: 12px; }
      summary { font-size: 12px; color: #4f46e5; cursor: pointer; }
      hr { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }
    </style>
  </head>
  <body>
    <header>
      <h1>ClearCaseIQ → CMS</h1>
    </header>
    <main>
      <label for="assessmentId">Case (assessment) ID</label>
      <input id="assessmentId" placeholder="Auto-detected from the current tab" />

      <label for="connection">Send to</label>
      <select id="connection"><option value="">All connected CMS</option></select>

      <button id="pushBtn">Push case to CMS</button>
      <div id="status" class="status"></div>

      <details id="settings">
        <summary>Settings</summary>
        <label for="apiBase">API base URL</label>
        <input id="apiBase" placeholder="http://localhost:4000" />
        <label for="token">Bearer token</label>
        <input id="token" type="password" placeholder="Paste your ClearCaseIQ token" />
        <div class="row">
          <button id="saveBtn" class="secondary">Save</button>
          <button id="testBtn" class="secondary">Reload connections</button>
        </div>
        <p class="muted">The extension calls the ClearCaseIQ API directly — it never scrapes your CMS.</p>
      </details>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
