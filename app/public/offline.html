<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3045" />
    <title>You're offline — ClearCaseIQ</title>
    <link rel="icon" type="image/svg+xml" href="/cciq-mark.svg" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(160deg, #f0f4f8 0%, #ffffff 55%);
        color: #1e3045;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 420px;
        text-align: center;
      }
      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        border-radius: 20px;
        background: linear-gradient(135deg, #456997 0%, #34547a 45%, #1e3045 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 30px -12px rgba(30, 48, 69, 0.55);
      }
      .mark svg { width: 40px; height: 40px; }
      h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
      p { font-size: 15px; line-height: 1.55; color: #475569; margin: 0 0 24px; }
      button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        background: #d97706;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        padding: 13px 22px;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover { background: #b45309; }
      .hint { margin-top: 16px; font-size: 13px; color: #94a3b8; }
      @media (prefers-color-scheme: dark) {
        body { background: linear-gradient(160deg, #0f1b2b 0%, #1e3045 60%); color: #e2e8f0; }
        p { color: #94a3b8; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill="#fff" fill-opacity=".97" d="M10.25 6.25h7.2L22 10.8v15.2c0 1.1-.9 2-2 2h-9.75c-1.1 0-2-.9-2-2V8.25c0-1.1.9-2 2-2z"/>
          <path fill="#fff" fill-opacity=".72" d="M17.45 6.25v5.05h4.4l-4.4-5.05z"/>
          <path stroke="#f59e0b" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.2 17.2l2.35 2.35 4.9-6.15"/>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>
        ClearCaseIQ needs an internet connection to load your case details.
        Your saved progress is safe — reconnect and try again.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
      <div class="hint">This page works even without a connection.</div>
    </main>
    <script>
      window.addEventListener('online', function () {
        window.location.reload()
      })
    </script>
  </body>
</html>
